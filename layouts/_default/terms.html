{{ define "main" }}
  <section class="page-hero">
    <p class="eyebrow">Tags</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}
      <p class="page-lead">{{ . }}</p>
    {{ end }}
  </section>

  <div class="tag-cloud">
    {{ range .Data.Terms.Alphabetical }}
      <a class="tag-cloud__item" href="{{ .Page.RelPermalink }}">
        {{ .Page.Title }} <span>{{ .Count }}</span>
      </a>
    {{ end }}
  </div>
{{ end }}
