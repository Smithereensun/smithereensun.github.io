<script>
  (() => {
    const searchBox = document.querySelector("[data-search-box]");
    if (!searchBox) return;

    const input = searchBox.querySelector("[data-search-input]");
    const items = Array.from(document.querySelectorAll("[data-search-item]"));
    const resultItems = Array.from(document.querySelectorAll("[data-search-result-item]"));
    if (!input || !items.length) return;

    const empty = document.querySelector("[data-search-empty]");
    const pagination = document.querySelector("[data-search-pagination]");
    const grid = document.querySelector("[data-search-grid]");
    const results = document.querySelector("[data-search-results]");

    const update = () => {
      const keyword = input.value.trim().toLowerCase();
      if (!keyword) {
        items.forEach((item) => {
          item.hidden = false;
        });
        resultItems.forEach((item) => {
          item.hidden = false;
        });
        if (grid) grid.hidden = false;
        if (results) results.hidden = true;
        if (empty) empty.hidden = true;
        if (pagination) pagination.hidden = false;
        return;
      }

      let visibleCount = 0;
      resultItems.forEach((item) => {
        const title = item.getAttribute("data-search-title") || "";
        const visible = title.includes(keyword);
        item.hidden = !visible;
        if (visible) visibleCount += 1;
      });

      items.forEach((item) => {
        item.hidden = true;
      });

      if (grid) grid.hidden = true;
      if (results) results.hidden = false;
      if (empty) empty.hidden = visibleCount !== 0;
      if (pagination) pagination.hidden = true;
    };

    input.addEventListener("input", update);
    window.addEventListener("pageshow", update);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        update();
      }
    });
    update();
  })();

  (() => {
    const marquees = Array.from(document.querySelectorAll(".external-marquee"));
    if (!marquees.length) return;

    marquees.forEach((marquee) => {
      const track = marquee.querySelector(".external-marquee__track");
      if (!track) return;

      let isDragging = false;
      let didDrag = false;
      let isPointerDown = false;
      let startX = 0;
      let startScrollLeft = 0;
      const dragThreshold = 6;

      const segmentWidth = () => Math.max(1, track.scrollWidth / 2);

      const normalizeScroll = () => {
        const width = segmentWidth();
        if (marquee.scrollLeft >= width) {
          marquee.scrollLeft -= width;
        } else if (marquee.scrollLeft < 0) {
          marquee.scrollLeft += width;
        }
      };

      const syncScrollFromAnimation = () => {
        const matrix = new DOMMatrixReadOnly(getComputedStyle(track).transform);
        const offset = Math.abs(matrix.m41 || 0);
        marquee.scrollLeft = offset % segmentWidth();
        track.style.animation = "none";
        track.style.transform = "translateX(0)";
      };

      const resumeAnimationFromScroll = () => {
        const width = segmentWidth();
        const progress = marquee.scrollLeft / width;
        const duration = Number.parseFloat(getComputedStyle(track).animationDuration) || 34;
        track.style.animation = "none";
        track.style.transform = "";
        track.offsetHeight;
        track.style.animation = "";
        track.style.animationDelay = `${-progress * duration}s`;
        marquee.scrollLeft = 0;
      };

      marquee.addEventListener("pointerenter", () => {
        marquee.classList.add("is-pointer-active");
        syncScrollFromAnimation();
      });

      marquee.addEventListener("pointerleave", () => {
        if (isDragging) return;
        marquee.classList.remove("is-pointer-active", "is-dragging");
        resumeAnimationFromScroll();
      });

      marquee.addEventListener("wheel", (event) => {
        if (!marquee.classList.contains("is-pointer-active")) return;
        const delta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
        if (!delta) return;
        event.preventDefault();
        marquee.scrollLeft += delta;
        normalizeScroll();
      }, { passive: false });

      marquee.addEventListener("pointerdown", (event) => {
        if (event.button !== 0) return;
        isPointerDown = true;
        didDrag = false;
        startX = event.clientX;
        startScrollLeft = marquee.scrollLeft;
        marquee.classList.add("is-pointer-active");
      });

      marquee.addEventListener("pointermove", (event) => {
        if (!isPointerDown) return;
        const distance = event.clientX - startX;
        if (!isDragging && Math.abs(distance) < dragThreshold) return;
        if (!isDragging) {
          isDragging = true;
          didDrag = true;
          marquee.classList.add("is-dragging");
          marquee.setPointerCapture(event.pointerId);
        }
        event.preventDefault();
        marquee.scrollLeft = startScrollLeft - distance;
        normalizeScroll();
      });

      const stopDragging = (event) => {
        isPointerDown = false;
        if (!isDragging) return;
        isDragging = false;
        marquee.classList.remove("is-dragging");
        if (marquee.hasPointerCapture(event.pointerId)) {
          marquee.releasePointerCapture(event.pointerId);
        }
        const bounds = marquee.getBoundingClientRect();
        const inside = event.clientX >= bounds.left && event.clientX <= bounds.right && event.clientY >= bounds.top && event.clientY <= bounds.bottom;
        if (!inside) {
          marquee.classList.remove("is-pointer-active");
          resumeAnimationFromScroll();
        }
        window.setTimeout(() => {
          didDrag = false;
        }, 0);
      };

      marquee.addEventListener("pointerup", stopDragging);
      marquee.addEventListener("pointercancel", stopDragging);
      marquee.addEventListener("click", (event) => {
        if (!didDrag) return;
        event.preventDefault();
        event.stopPropagation();
        window.setTimeout(() => {
          didDrag = false;
        }, 0);
      }, true);
    });
  })();
</script>
